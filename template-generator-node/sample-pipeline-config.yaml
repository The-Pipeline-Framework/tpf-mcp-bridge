version: 2
appName: Sample Pipeline App
basePackage: com.example.sample
platform: COMPUTE
runtimeLayout: modular
messages:
  CustomerInput:
    fields:
      - number: 1
        name: id
        type: uuid
      - number: 2
        name: name
        type: string
      - number: 3
        name: email
        type: string
      - number: 4
        name: createdAt
        type: datetime
  CustomerOutput:
    fields:
      - number: 1
        name: id
        type: uuid
      - number: 2
        name: name
        type: string
      - number: 3
        name: status
        type: string
      - number: 4
        name: processedAt
        type: timestamp
  OrderInput:
    fields:
      - number: 1
        name: id
        type: uuid
      - number: 2
        name: customerId
        type: uuid
      - number: 3
        name: amount
        type: decimal
  ValidationOutput:
    fields:
      - number: 1
        name: id
        type: uuid
      - number: 2
        name: isValid
        type: bool
      - number: 3
        name: message
        type: string
steps:
  - name: Process Customer
    cardinality: ONE_TO_ONE
    inputTypeName: CustomerInput
    outputTypeName: CustomerOutput
    batchSize: 10
    batchTimeoutMs: 1000
    parallel: false
  - name: Validate Order
    cardinality: ONE_TO_ONE
    inputTypeName: OrderInput
    outputTypeName: ValidationOutput
    batchSize: 10
    batchTimeoutMs: 1000
    parallel: false
