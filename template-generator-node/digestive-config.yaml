version: 2
appName: DigestivePipeline
basePackage: com.example.digestive

messages:
  FoodItem:
    fields:
      - number: 1
        name: id
        type: uuid
      - number: 2
        name: name
        type: string
      - number: 3
        name: massGrams
        type: float64
      - number: 4
        name: composition
        type: string
        repeated: true
  Bolus:
    fields:
      - number: 1
        name: id
        type: uuid
      - number: 2
        name: contents
        type: string
        repeated: true
      - number: 3
        name: chewedMass
        type: float64
      - number: 4
        name: salivaEnzymes
        type: string
        repeated: true
  Chyme:
    fields:
      - number: 1
        name: id
        type: uuid
      - number: 2
        name: nutrientMix
        type: string
        repeated: true
      - number: 3
        name: acidLevel
        type: float64
      - number: 4
        name: liquidity
        type: float64
  Nutrients:
    fields:
      - number: 1
        name: id
        type: uuid
      - number: 2
        name: name
        type: string
      - number: 3
        name: amountMg
        type: float64
      - number: 4
        name: absorptionRate
        type: float64
  Residue:
    fields:
      - number: 1
        name: id
        type: uuid
      - number: 2
        name: dryMatter
        type: float64
      - number: 3
        name: remainingFiber
        type: float64
  WasteProduct:
    fields:
      - number: 1
        name: id
        type: uuid
      - number: 2
        name: massGrams
        type: float64
      - number: 3
        name: emoji
        type: string

steps:
  - name: MouthStage
    cardinality: ONE_TO_ONE
    inputTypeName: FoodItem
    outputTypeName: Bolus
    parallel: false

  - name: StomachStage
    cardinality: ONE_TO_ONE
    inputTypeName: Bolus
    outputTypeName: Chyme
    parallel: false

  - name: SmallIntestineStage
    cardinality: EXPANSION
    inputTypeName: Chyme
    outputTypeName: Nutrients
    parallel: true

  - name: LargeIntestineStage
    cardinality: REDUCTION
    inputTypeName: Nutrients
    outputTypeName: Residue
    batchSize: 20
    batchTimeoutMs: 1500
    parallel: false

  - name: RectumStage
    cardinality: ONE_TO_ONE
    inputTypeName: Residue
    outputTypeName: WasteProduct
    parallel: false
