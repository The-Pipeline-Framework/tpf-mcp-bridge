name: Template Generator Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  rest-await-union-compile:
    name: REST await union scaffold compile
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout bridge
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Checkout framework v26.6.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: The-Pipeline-Framework/pipelineframework
          ref: v26.6.1
          path: pipelineframework-v26.6.1
          persist-credentials: false

      - name: Setup Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: pipelineframework-v26.6.1/**/*.xml

      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            template-generator-node/package-lock.json

      - name: Install bridge dependencies
        run: npm ci

      - name: Install vendored generator dependencies
        run: npm --prefix template-generator-node ci

      - name: Build bridge
        run: npm run build

      - name: Check vendored pipeline schema
        run: npm run check:pipeline-schema -- "${GITHUB_WORKSPACE}/pipelineframework-v26.6.1/framework/deployment/src/main/resources/META-INF/pipeline/pipeline-template-schema.json"

      - name: Compile generated REST await union scaffold
        run: npm run smoke:rest-await-union -- --framework-dir "${GITHUB_WORKSPACE}/pipelineframework-v26.6.1"

      - name: Compile generated Kafka await scaffold
        run: npm run smoke:kafka-await -- --framework-dir "${GITHUB_WORKSPACE}/pipelineframework-v26.6.1"
