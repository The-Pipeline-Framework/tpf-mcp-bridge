name: Publish — TPF MCP to npm

on:
  push:
    tags:
      - "tpf-mcp-v*"
  workflow_dispatch:

jobs:
  publish:
    name: Publish bridge package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify npm trusted publishing support
        run: |
          node --version
          npm --version
          node - <<'NODE'
          const version = require("child_process").execSync("npm --version", { encoding: "utf8" }).trim();
          const [major, minor, patch] = version.split(".").map(Number);
          const supportsTrustedPublishing = major > 11
            || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1)));
          if (!supportsTrustedPublishing) {
            console.error(`npm ${version} does not support trusted publishing. Require npm >= 11.5.1.`);
            process.exit(1);
          }
          NODE

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="tpf-mcp-v${PACKAGE_VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}."
            echo "Expected tag: ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install vendored generator dependencies
        run: npm --prefix template-generator-node ci

      - name: Run bridge tests
        run: npm test

      - name: Run vendored generator tests
        run: npm --prefix template-generator-node test

      - name: Inspect publish tarball
        run: npm pack --dry-run

      - name: Publish package to npm
        run: npm publish
