name: Publish — TPF MCP Bridge to npm

on:
  push:
    tags:
      - "tpf-mcp-bridge-v*"
  workflow_dispatch:

jobs:
  publish:
    name: Publish bridge package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            template-generator-node/package-lock.json

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="tpf-mcp-bridge-v${PACKAGE_VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}."
            echo "Expected tag: ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install vendored generator dependencies
        run: npm --prefix template-generator-node ci

      - name: Run bridge tests
        run: npm test

      - name: Run vendored generator tests
        run: npm --prefix template-generator-node test

      - name: Inspect publish tarball
        run: npm pack --dry-run

      - name: Publish package to npm
        run: npm publish
